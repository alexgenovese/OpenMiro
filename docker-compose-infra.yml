version: "3.8"

# NOTE: OpenSpace (self-evolving skills engine) is NOT a Docker service.
# It runs as a local stdio MCP process spawned by CAMEL agents at runtime.
# Install it once with: pip install "openspace @ git+https://github.com/HKUDS/OpenSpace.git"
# Evolved skills are persisted locally in ./data/openspace/skills/

services:
  # LLM Gateway Router (optional: only needed if using local model routing)
  bifrost:
    image: maximhq/bifrost:latest
    container_name: openmiro-bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./data/bifrost:/app/data
    restart: unless-stopped

  # Local LLM Inference
  ollama:
    image: ollama/ollama:latest
    container_name: openmiro-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Remove comment below if you have a GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_data:
