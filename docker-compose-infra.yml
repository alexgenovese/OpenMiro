version: "3.8"

# NOTE: OpenSpace (self-evolving skills engine) is NOT a Docker service.
# It runs as a local stdio MCP process spawned by CAMEL agents at runtime.
# Install it once with: pip install "openspace @ git+https://github.com/HKUDS/OpenSpace.git"
# Evolved skills are persisted locally in ./data/openspace/skills/

services:
  # LLM Gateway Router (optional: only needed if using local model routing)
  bifrost:
    image: maximhq/bifrost:latest
    container_name: openmiro-bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./data/bifrost:/app/data
    restart: unless-stopped

  # Local LLM Inference
  ollama:
    image: ollama/ollama:latest
    container_name: openmiro-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Remove comment below if you have a GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  # Vector / Graph Memory Database
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: openmiro-hindsight
    ports:
      - "8888:8888" # API
      - "9999:9999" # UI
    environment:
      # Route through Bifrost (Docker internal network: bifrost:8080)
      - HINDSIGHT_API_LLM_PROVIDER=openai
      # Use 9b for consolidation (faster, avoids 30s Bifrost timeout with 122b)
      - HINDSIGHT_API_LLM_MODEL=Regolo/qwen3.5-9b
      - HINDSIGHT_API_LLM_API_KEY=${OPENAI_API_KEY:-dummy_key}
      - HINDSIGHT_API_LLM_BASE_URL=http://bifrost:8080/v1
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    restart: unless-stopped

volumes:
  ollama_data:
  hindsight_data:
