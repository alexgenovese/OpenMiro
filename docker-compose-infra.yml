version: "3.8"

services:
  # LLM Gateway Router
  bifrost:
    image: maximhq/bifrost:latest
    container_name: openmiro-bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./data/bifrost:/app/data
    restart: unless-stopped

  # Local LLM Inference
  ollama:
    image: ollama/ollama:latest
    container_name: openmiro-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Remove comment below if you have a GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

  # Vector / Graph Memory Database
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: openmiro-hindsight
    ports:
      - "8888:8888" # API
      - "9999:9999" # UI
    environment:
      # Use Ollama directly for Hindsight's internal processing to avoid needing an API key
      - HINDSIGHT_API_LLM_PROVIDER=ollama
      - HINDSIGHT_API_LLM_MODEL=llama3
      - HINDSIGHT_API_LLM_API_KEY=dummy
      - HINDSIGHT_API_LLM_BASE_URL=http://openmiro-ollama:11434/v1
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    restart: unless-stopped
    depends_on:
      - ollama

volumes:
  ollama_data:
  hindsight_data:
