server:
  port: 8080
  workers: 4

routes:
  - model: "local-standard"
    backend: "ollama"
    endpoint: "http://ollama:11434/v1"
    target_model: "llama3:8b"
    timeout: 30s
    retry_strategy:
      max_retries: 2
    fallback:
      - model: "cloud-fallback"

  - model: "cloud-fallback"
    backend: "openai-compatible"
    endpoint: "https://api.x.ai/v1"
    target_model: "grok-1"
    api_key: ${XAI_API_KEY}
